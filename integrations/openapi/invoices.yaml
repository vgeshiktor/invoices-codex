openapi: 3.0.3
info:
  title: Invoices Platform API
  version: 1.0.0-mvp
  description: |
    MVP API contract for multi-tenant invoice ingestion, parsing, and reporting.
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://staging.example.com
    description: Staging
security:
  - ApiKeyAuth: []
paths:
  /v1/files:
    post:
      summary: Register an uploaded invoice file
      operationId: createFile
      tags: [Files]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File metadata created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/files/{file_id}:
    get:
      summary: Get file metadata
      operationId: getFile
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/parse-jobs:
    post:
      summary: Create parse job
      operationId: createParseJob
      tags: [ParseJobs]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateParseJobRequest'
      responses:
        '202':
          description: Parse job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/parse-jobs/{job_id}:
    get:
      summary: Get parse job status
      operationId: getParseJob
      tags: [ParseJobs]
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Parse job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/invoices:
    get:
      summary: List parsed invoices
      operationId: listInvoices
      tags: [Invoices]
      parameters:
        - name: parse_job_id
          in: query
          schema:
            type: string
            format: uuid
        - name: vendor
          in: query
          schema:
            type: string
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/invoices/{invoice_id}:
    get:
      summary: Get one parsed invoice
      operationId: getInvoice
      tags: [Invoices]
      parameters:
        - name: invoice_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/reports:
    get:
      summary: List report jobs
      operationId: listReports
      tags: [Reports]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, succeeded, failed]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create report job
      operationId: createReport
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '202':
          description: Report job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/reports/{report_id}:
    get:
      summary: Get report status and artifacts
      operationId: getReport
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Report status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/reports/{report_id}/download:
    get:
      summary: Download generated artifact
      operationId: downloadReportArtifact
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [json, csv, summary_csv, pdf]
      responses:
        '200':
          description: Binary or streamed file response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/reports/{report_id}/retry:
    post:
      summary: Requeue a report job
      operationId: retryReport
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '202':
          description: Report job requeued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    FileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Duplicate or conflicting request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    CreateFileRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
    FileResponse:
      type: object
      required: [id, filename, mime_type, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        mime_type:
          type: string
        content_sha256:
          type: string
        status:
          type: string
          enum: [uploaded, validated, parsed, rejected]
        storage_path:
          type: string
        bytes:
          type: integer
        created_at:
          type: string
          format: date-time
    CreateParseJobRequest:
      type: object
      required: [file_ids]
      properties:
        file_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        debug:
          type: boolean
          default: false
    ParseJobResponse:
      type: object
      required: [id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        idempotency_key:
          type: string
        queue_job_id:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        records_count:
          type: integer
          minimum: 0
        failed_count:
          type: integer
          minimum: 0
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
    InvoiceRecord:
      type: object
      required: [id, parse_job_id, vendor, file_name]
      properties:
        id:
          type: string
          format: uuid
        parse_job_id:
          type: string
          format: uuid
        vendor:
          type: string
        file_name:
          type: string
        invoice_number:
          type: string
        invoice_date:
          type: string
          format: date
        invoice_total:
          type: number
          format: float
        invoice_vat:
          type: number
          format: float
        currency:
          type: string
          default: ILS
        purpose:
          type: string
        raw:
          type: object
          additionalProperties: true
    InvoiceListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceRecord'
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
        offset:
          type: integer
    CreateReportRequest:
      type: object
      properties:
        parse_job_ids:
          type: array
          items:
            type: string
            format: uuid
        filters:
          type: object
          additionalProperties: true
        formats:
          type: array
          items:
            type: string
            enum: [json, csv, summary_csv, pdf]
          default: [json, csv, summary_csv]
      required: [formats]
    ReportArtifact:
      type: object
      required: [format, storage_path]
      properties:
        format:
          type: string
          enum: [json, csv, summary_csv, pdf]
        storage_path:
          type: string
        bytes:
          type: integer
    ReportResponse:
      type: object
      required: [id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        idempotency_key:
          type: string
        queue_job_id:
          type: string
        requested_formats:
          type: array
          items:
            type: string
            enum: [json, csv, summary_csv, pdf]
        filters:
          type: object
          additionalProperties: true
        error_message:
          type: string
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ReportArtifact'
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
    ReportListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportResponse'
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
        offset:
          type: integer
