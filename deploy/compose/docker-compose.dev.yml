services:
  api-go:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api-go
    ports: ["8080:8080"]
    env_file: ["../../.env"]
    depends_on: [db]

  workers-py:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.workers-py
    env_file: ["../../.env"]
    volumes:
      - ../../storage:/data/files
    depends_on: [db, mq]

  saas-api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.workers-py
    env_file: ["../../.env"]
    environment:
      PYTHONPATH: /app/src
      SAAS_CONTROL_PLANE_API_KEY: ${SAAS_CONTROL_PLANE_API_KEY:-dev-control-plane-key}
      SAAS_AUTH_ACCESS_TOKEN_SECRET: ${SAAS_AUTH_ACCESS_TOKEN_SECRET:-dev-auth-access-token-secret}
    command:
      - python
      - -m
      - invplatform.cli.saas_api
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - --database-url
      - sqlite:////data/files/invoices_saas.db
      - --storage-url
      - local:///data/files/saas_storage
      - --redis-url
      - redis://redis:6379/0
      - --control-plane-api-key
      - ${SAAS_CONTROL_PLANE_API_KEY:-dev-control-plane-key}
      - --allow-insecure-auth-cookie
    ports: ["8081:8081"]
    volumes:
      - ../../storage:/data/files
    depends_on: [redis]

  saas-rq-worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.workers-py
    env_file: ["../../.env"]
    environment:
      PYTHONPATH: /app/src
    command:
      - python
      - -m
      - invplatform.cli.saas_rq_worker
      - --database-url
      - sqlite:////data/files/invoices_saas.db
      - --storage-url
      - local:///data/files/saas_storage
      - --redis-url
      - redis://redis:6379/0
      - --queue
      - invoices
    volumes:
      - ../../storage:/data/files
    depends_on: [redis]

  n8n:
    build:
      context: ../../
      dockerfile: integrations/n8n/Dockerfile
    env_file:
      - ../../integrations/n8n/n8n.env.example
      - ../../.env
    environment:
      N8N_USER_FOLDER: /home/node/.n8n
      NODES_EXCLUDE: '["n8n-nodes-base.localFileTrigger"]'
      PYTHONPATH: /workspace/apps/workers-py/src
    user: "root"
    ports: ["5678:5678"]
    volumes:
      - n8n_data:/home/node/.n8n
      - ../../:/workspace
    depends_on: [db, mq]

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoices
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data

  mq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pg_data:
  n8n_data:
