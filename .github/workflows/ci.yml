name: ci
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Go
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Go test & lint
        working-directory: apps/api-go
        run: |
          go mod tidy
          go vet ./...
          go test ./...

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -r apps/workers-py/requirements.txt
          pip install pdfminer.six rapidfuzz ruff pytest pytest-cov
      - name: Python lint
        run: |
          PYTHONPATH=apps/workers-py/src python -m ruff check apps/workers-py/src tests
      - name: Python tests
        run: |
          make test COVERAGE_MIN=80

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Frontend generated-client drift check
        working-directory: apps/web
        run: npm run api:check

      - name: Frontend lint
        working-directory: apps/web
        run: npm run lint

      - name: Frontend typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Frontend tests
        working-directory: apps/web
        run: npm run test

      - name: Frontend build
        working-directory: apps/web
        run: npm run build
